<!DOCTYPE html>
<html>
<head>
<title>AWS Lambda Calculator</title>

<style>
body{
font-family:Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:10px;
background:#0073e6;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#005bb5;
}

#result{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Lambda Calculator</h2>

<input id="num1" type="number" placeholder="First number">

<select id="operation">
<option value="+">+</option>
<option value="-">-</option>
<option value="*">*</option>
<option value="/">/</option>
</select>

<input id="num2" type="number" placeholder="Second number">

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

<script>

const LAMBDA_URL = "https://pk74vf5naxlqp4gj3dby2nwri40xdwjn.lambda-url.us-east-1.on.aws/";

async function calculate(){

const resultDiv = document.getElementById("result");

try{

const num1 = document.getElementById("num1").value;
const num2 = document.getElementById("num2").value;
const operation = document.getElementById("operation").value;

const url = `${LAMBDA_URL}?num1=${encodeURIComponent(num1)}&num2=${encodeURIComponent(num2)}&operation=${encodeURIComponent(operation)}`;

const response = await fetch(url);

const data = await response.json();

if(!response.ok){
throw new Error(data.error || "Unknown error");
}

resultDiv.innerText = "Result: " + data.result;

}
catch(error){

resultDiv.innerText = "Error: " + error.message;

}

}

</script>

</body>
</html>
